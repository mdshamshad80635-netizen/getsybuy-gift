<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — GetsyBuy Gift</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================
       ADMIN PANEL STYLES
    ============================================ */
    :root {
      --bg: #080808;
      --bg2: #0d0d0d;
      --bg3: #111;
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: rgba(201, 168, 76, 0.12);
      --gold-border: rgba(201, 168, 76, 0.25);
      --white: #fff;
      --white-70: rgba(255,255,255,0.7);
      --white-40: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.08);
      --red: #ef4444;
      --green: #22c55e;
      --radius: 14px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ---- LOGIN SCREEN ---- */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 44px;
      width: min(420px, 90vw);
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.7);
    }

    .login-card.shake {
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .login-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.85rem;
      color: var(--white-40);
      margin-bottom: 36px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .admin-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 46px 13px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .admin-input:focus {
      border-color: var(--gold-border);
      background: rgba(201, 168, 76, 0.05);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--white-40);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #fca5a5;
      margin-bottom: 14px;
      text-align: left;
    }

    .btn-login {
      width: 100%;
      background: var(--gold);
      border: none;
      color: #000;
      padding: 14px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.04em;
    }

    .btn-login:hover:not(:disabled) {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(201, 168, 76, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-hint {
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--white-40);
    }

    .login-hint code {
      background: var(--gold-dim);
      color: var(--gold);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    /* ---- DASHBOARD ---- */
    #dashboardScreen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
    }

    /* Admin Nav */
    .admin-nav {
      background: rgba(8,8,8,0.95);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-logo span { color: var(--gold); }

    .admin-nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-badge {
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .btn-logout {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-logout:hover {
      background: rgba(239,68,68,0.2);
      color: #fff;
    }

    .btn-home {
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-home:hover {
      background: var(--gold);
      color: #000;
    }

    /* Admin Content */
    .admin-content {
      flex: 1;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: var(--gold-border);
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      color: var(--white-40);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-card .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
    }

    /* Categories stat */
    #statsCats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    #statsCats span {
      font-size: 0.72rem;
      color: var(--white-40);
      background: rgba(255,255,255,0.05);
      padding: 3px 8px;
      border-radius: 4px;
    }

    #statsCats span strong {
      color: var(--gold);
    }

    /* Toolbar */
    .admin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .admin-toolbar h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-search-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 16px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      width: 220px;
      transition: all 0.3s;
    }

    .admin-search-input:focus {
      border-color: var(--gold-border);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .btn-add {
      background: var(--gold);
      border: none;
      color: #000;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,168,76,0.3);
    }

    /* Products Table */
    .admin-table-wrap {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    .admin-table thead tr {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--border);
    }

    .admin-table th {
      padding: 14px 18px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white-40);
    }

    .admin-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .admin-table tbody tr:last-child {
      border-bottom: none;
    }

    .admin-table tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .admin-table td {
      padding: 14px 18px;
      vertical-align: middle;
    }

    .product-row-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .product-row-info img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .product-row-info strong {
      display: block;
      font-size: 0.875rem;
      margin-bottom: 3px;
    }

    .product-row-info small a {
      font-size: 0.75rem;
      color: var(--gold);
      text-decoration: none;
    }

    .product-row-info small a:hover {
      text-decoration: underline;
    }

    .cat-badge {
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .rating-badge {
      font-size: 0.82rem;
      color: var(--gold);
    }

    .action-btns {
      display: flex;
      gap: 8px;
    }

    .btn-edit {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--white-70);
      padding: 7px 12px;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-edit:hover {
      border-color: var(--gold-border);
      color: var(--gold);
      background: var(--gold-dim);
    }

    .btn-delete {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      padding: 7px 12px;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-delete:hover {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.4);
      color: #fff;
    }

    /* Loading & Empty */
    .admin-loading, .admin-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      text-align: center;
    }

    .admin-loader {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .admin-loading span, .admin-empty p {
      font-size: 0.85rem;
      color: var(--white-40);
    }

    .admin-empty span { font-size: 2.5rem; }
    .admin-empty h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--white-70);
    }

    /* ---- MODAL ---- */
    #productModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #productModal.open .modal-card {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-card {
      background: #0f0f0f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: min(580px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95) translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .modal-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .modal-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--white-70);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--white-40);
      margin-bottom: 7px;
    }

    .form-group label .required {
      color: var(--gold);
      margin-left: 3px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: all 0.3s;
      resize: vertical;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--gold-border);
      background: rgba(201, 168, 76, 0.04);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .form-group select option {
      background: #111;
      color: var(--white);
    }

    #imagePreview {
      display: none;
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--gold-border);
      margin-top: 10px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--white-70);
      padding: 11px 24px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.09);
      color: var(--white);
    }

    .btn-save {
      background: var(--gold);
      border: none;
      color: #000;
      padding: 11px 28px;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-save:hover:not(:disabled) {
      background: var(--gold-light);
      transform: translateY(-1px);
    }

    .btn-save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Toast */
    #adminToastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .admin-toast {
      background: rgba(13,13,13,0.97);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 10px;
      padding: 13px 18px;
      font-size: 0.85rem;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 240px;
      animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: opacity 0.3s, transform 0.3s;
    }

    @keyframes toastIn {
      from { opacity:0; transform:translateX(30px); }
      to { opacity:1; transform:translateX(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .admin-content { padding: 16px; }
      .admin-nav { padding: 0 16px; }
      .modal-card { padding: 24px; }
      .form-row { grid-template-columns: 1fr; }
      .admin-badge { display: none; }
      .toolbar-right { flex-wrap: wrap; }
      .admin-search-input { width: 160px; }
    }
  </style>
</head>

<body>

  <!-- ============ LOGIN SCREEN ============ -->
  <div id="loginScreen">
    <div class="login-card">
      <span class="login-icon">🔐</span>
      <h1 class="login-title">Admin Access</h1>
      <p class="login-subtitle">GetsyBuy Gift Dashboard</p>

      <form id="loginForm" autocomplete="off">
        <div class="input-wrap">
          <input
            type="password"
            id="passwordInput"
            class="admin-input"
            placeholder="Enter admin password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pass" id="togglePassword" aria-label="Toggle password visibility">👁</button>
        </div>

        <div class="error-msg" id="loginError">
          ⚠ Incorrect password. Please try again.
        </div>

        <button type="submit" class="btn-login">Login to Dashboard</button>
      </form>

      <p class="login-hint">
        Default password: <code>getsybuy2024admin</code><br>
        Change in <code>admin.js</code> before deploying
      </p>
    </div>
  </div>

  <!-- ============ DASHBOARD ============ -->
  <div id="dashboardScreen">

    <!-- Admin Nav -->
    <nav class="admin-nav">
      <a href="index.html" class="admin-logo">🎁 <span>GetsyBuy</span> Gift</a>
      <div class="admin-nav-right">
        <span class="admin-badge">⚙ Admin</span>
        <a href="index.html" class="btn-home">← Store</a>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="admin-content">

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Products</div>
          <div class="stat-val" id="statsTotal">0</div>
        </div>
        <div class="stat-card" style="grid-column: span 2;">
          <div class="stat-label">By Category</div>
          <div id="statsCats"></div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="admin-toolbar">
        <h2>🎁 Gift Products</h2>
        <div class="toolbar-right">
          <input
            type="search"
            class="admin-search-input"
            id="searchAdmin"
            placeholder="Search products..."
            autocomplete="off"
          />
          <button class="btn-add" onclick="openAddModal()">
            + Add Product
          </button>
        </div>
      </div>

      <!-- Products Table -->
      <div class="admin-table-wrap">
        <div id="productsList">
          <!-- Injected by JavaScript -->
        </div>
      </div>

    </div>
  </div>

  <!-- ============ PRODUCT MODAL ============ -->
  <div id="productModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">Add New Product</h3>
        <button class="modal-close" onclick="closeModal()" aria-label="Close modal">✕</button>
      </div>

      <form id="productForm" autocomplete="off">
        <!-- Row 1: Name -->
        <div class="form-group">
          <label for="fieldName">Product Name <span class="required">*</span></label>
          <input type="text" id="fieldName" placeholder="e.g. Luxury Skincare Gift Set" required />
        </div>

        <!-- Row 2: Image + Affiliate -->
        <div class="form-row">
          <div class="form-group">
            <label for="fieldImage">Image URL <span class="required">*</span></label>
            <input type="url" id="fieldImage" placeholder="https://images.unsplash.com/..." required />
            <img id="imagePreview" alt="Preview" />
          </div>
          <div class="form-group">
            <label for="fieldAffiliate">Amazon Affiliate Link <span class="required">*</span></label>
            <input type="url" id="fieldAffiliate" placeholder="https://amazon.in/dp/...?tag=getsybuy-21" required />
          </div>
        </div>

        <!-- Row 3: Category + Rating -->
        <div class="form-row">
          <div class="form-group">
            <label for="fieldCategory">Category</label>
            <select id="fieldCategory">
              <option value="All Gifts">All Gifts</option>
              <option value="Electronics">Electronics</option>
              <option value="Food & Drink">Food & Drink</option>
              <option value="Beauty">Beauty</option>
              <option value="Home Decor">Home Decor</option>
              <option value="Fashion">Fashion</option>
            </select>
          </div>
          <div class="form-group">
            <label for="fieldRating">Star Rating (1–5)</label>
            <input type="number" id="fieldRating" min="1" max="5" step="0.1" value="4.5" />
          </div>
        </div>

        <!-- Row 4: Price + Description -->
        <div class="form-row">
          <div class="form-group">
            <label for="fieldPrice">Display Price</label>
            <input type="text" id="fieldPrice" placeholder="e.g. ₹1,999" />
          </div>
          <div class="form-group">
            <label for="fieldDescription">Short Description</label>
            <input type="text" id="fieldDescription" placeholder="One-line product description" />
          </div>
        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save" id="submitBtn">Add Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="adminToastContainer"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
  <script src="admin.js"></script>

</body>
</html>
